@if (dot()) {
	<span class="hub-badge__dot" aria-hidden="true"></span>
}

@if (icon(); as iconClass) {
	<i class="hub-badge__icon" [class]="iconClass" aria-hidden="true"></i>
}

<span class="hub-badge__label">
	<ng-content></ng-content>
</span>

@if (trailingIcon(); as trailingIconClass) {
	<i class="hub-badge__icon hub-badge__icon--trailing" [class]="trailingIconClass" aria-hidden="true"></i>
}

@if (removable()) {
	<button
		type="button"
		class="hub-badge__remove"
		[attr.aria-label]="removeLabel()"
		[disabled]="disabled()"
		(click)="handleRemove()"
	>
		<span aria-hidden="true">&times;</span>
	</button>
}

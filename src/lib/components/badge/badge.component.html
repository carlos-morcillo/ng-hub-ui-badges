@if (dot()) {
	<span class="hub-badge__dot" aria-hidden="true"></span>
}

<span #content class="hub-badge__content"><ng-content></ng-content></span>

@if (removable()) {
	<button
		type="button"
		class="hub-badge__remove"
		[attr.aria-label]="removeLabel()"
		[disabled]="disabled()"
		(click)="handleRemove()"
	>
		<span aria-hidden="true">&times;</span>
	</button>
}
